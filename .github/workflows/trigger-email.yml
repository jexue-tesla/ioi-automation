name: Trigger Power Automate Email

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 6'  # Runs at 2:00 AM UTC on Saturday (6:00 PM PST on Friday)

jobs:
  trigger-flow:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # Use a stable version

      - name: Install dependencies
        run: |
          pip install pandas sqlalchemy pyodbc requests

      - name: Install ODBC Driver 17 for SQL Server (Windows)
        run: |
          # Create temp directory
          mkdir -p C:\temp\odbc_driver
          
          # Download ODBC Driver MSI
          curl -L -o "C:\temp\ODBC17.msi" "https://go.microsoft.com/fwlink/?linkid=2110802"
          
          # Verify download
          dir C:\temp\
          
          # Install using msiexec
          msiexec /i "C:\temp\ODBC17.msi" /quiet /norestart
          
          # Clean up installer
          del C:\temp\ODBC17.msi
          
      - name: Run Python script
        env:
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POWER_AUTOMATE_WEBHOOK_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
        run: |
          python weeklyioi_updated_11.26.25.py

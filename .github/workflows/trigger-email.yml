name: Trigger Power Automate Email

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 6'  # Runs at 2:00 AM UTC on Saturday (6:00 PM PST on Friday)

jobs:
  trigger-flow:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # Use a stable version

      - name: Install dependencies
        run: |
          pip install pandas sqlalchemy pyodbc requests

      - name: Install ODBC Driver 17 for SQL Server (Windows)
        run: |
          # Download the Windows installer
          curl -o C:\tmp\ODBC-17.10.1.1-1.x86_64.exe https://download.microsoft.com/download/7/1/3/713b5d7c-4c0e-4c35-8d6e-4a7d6a6c6a6e/ODBC-17.10.1.1-1.x86_64.exe

          # Run the installer silently
          C:\tmp\ODBC-17.10.1.1-1.x86_64.exe /quiet
          
      - name: Run script
        run: |
          python weeklyioi_updated_11.26.25.py
